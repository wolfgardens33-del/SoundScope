<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080c10">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SoundScope">
<title>SoundScope — HD Recorder</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap');

  :root {
    --bg: #060a0e;
    --panel: #0c1318;
    --border: #1a2a35;
    --accent: #00e5ff;
    --accent2: #00ff9d;
    --accent3: #ff3d71;
    --warn: #ffaa00;
    --text: #c8dde8;
    --dim: #4a6070;
    --glow: 0 0 12px #00e5ff55;
    --glow2: 0 0 12px #00ff9d55;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    user-select: none;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, #0a1520 0%, transparent 100%);
  }

  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 2px;
    text-shadow: var(--glow);
  }

  .logo span { color: var(--accent2); }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
  }

  .led {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: all 0.3s;
  }
  .led.active { background: var(--accent3); box-shadow: 0 0 8px var(--accent3); }
  .led.ready { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

  main {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 0;
  }

  /* ── SPECTRUM ANALYZER ── */
  .spectrum-section {
    position: relative;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    position: absolute;
    top: 8px; left: 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    z-index: 2;
  }

  #spectrumCanvas {
    display: block;
    width: 100%;
    height: 200px;
  }

  /* ── WAVEFORM ── */
  .waveform-section {
    position: relative;
    background: #080e14;
    border-bottom: 1px solid var(--border);
  }

  #waveformCanvas {
    display: block;
    width: 100%;
    height: 90px;
  }

  /* ── METERS STRIP ── */
  .meters-strip {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .meter-cell {
    background: var(--panel);
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .meter-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
  }

  .meter-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    color: var(--accent);
    text-shadow: var(--glow);
    line-height: 1;
  }

  .meter-value.warn { color: var(--warn); text-shadow: 0 0 10px var(--warn); }
  .meter-value.clip { color: var(--accent3); text-shadow: 0 0 10px var(--accent3); }
  .meter-value.green { color: var(--accent2); text-shadow: var(--glow2); }

  .meter-unit {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    color: var(--dim);
  }

  /* ── VU BARS ── */
  .vu-section {
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .vu-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .vu-ch {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    width: 16px;
    flex-shrink: 0;
  }

  .vu-track {
    flex: 1;
    height: 12px;
    background: #0a1520;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .vu-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--warn), var(--accent3));
    background-size: 400% 100%;
    transition: width 0.05s;
    border-radius: 1px;
  }

  .vu-peak {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: #fff;
    opacity: 0.7;
  }

  .vu-db {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    width: 40px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── FREQ LABELS ── */
  .freq-labels {
    display: flex;
    justify-content: space-between;
    padding: 4px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }

  .freq-labels span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  /* ── CONTROLS ── */
  .controls-section {
    padding: 16px;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .btn {
    flex: 1;
    max-width: 160px;
    padding: 14px 10px;
    border: 1px solid var(--border);
    background: #0c1318;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn:active { transform: scale(0.97); }

  .btn-record {
    border-color: var(--accent3);
    color: var(--accent3);
  }
  .btn-record:hover, .btn-record.active-btn {
    background: rgba(255,61,113,0.15);
    box-shadow: 0 0 20px rgba(255,61,113,0.3), inset 0 0 10px rgba(255,61,113,0.1);
  }

  .btn-stop {
    border-color: var(--dim);
    color: var(--dim);
  }
  .btn-stop.active-btn {
    border-color: var(--warn);
    color: var(--warn);
    box-shadow: 0 0 15px rgba(255,170,0,0.2);
  }

  .btn-save {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn-save:hover {
    background: rgba(0,255,157,0.1);
    box-shadow: 0 0 15px rgba(0,255,157,0.25);
  }

  /* ── SETTINGS ROW ── */
  .settings-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .setting-block {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
  }

  .setting-block label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--dim);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .setting-block select {
    width: 100%;
    background: #060a0e;
    border: 1px solid var(--border);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 4px 6px;
    border-radius: 2px;
    appearance: none;
  }

  .setting-block select:focus { outline: none; border-color: var(--accent); }

  /* ── RECORDINGS LIST ── */
  .recordings-section {
    flex: 1;
    padding: 0 16px 16px;
  }

  .recordings-header {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    padding: 12px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .recording-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 6px;
    transition: border-color 0.2s;
  }

  .recording-item:hover { border-color: var(--accent); }

  .rec-icon {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    flex-shrink: 0;
  }

  .rec-info { flex: 1; }

  .rec-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent);
  }

  .rec-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    margin-top: 2px;
  }

  .rec-actions { display: flex; gap: 6px; }

  .rec-btn {
    padding: 5px 10px;
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .rec-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .rec-btn.dl { border-color: var(--accent2); color: var(--accent2); }

  /* ── TIMER ── */
  .timer-display {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    color: var(--accent);
    text-shadow: var(--glow);
    letter-spacing: 4px;
    padding: 4px 0 0;
  }

  .timer-display.recording { color: var(--accent3); text-shadow: 0 0 15px var(--accent3); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  .no-recs {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    padding: 20px;
    letter-spacing: 2px;
  }

  /* ── PEAK INDICATOR ── */
  .peak-hold {
    position: absolute;
    top: 8px; right: 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    z-index: 2;
  }

  audio { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">SOUND<span>SCOPE</span></div>
  <div class="status-row">
    <div class="led" id="recLed"></div>
    <span id="statusText" style="font-size:9px;letter-spacing:2px;">STANDBY</span>
  </div>
</header>

<main>

  <!-- SPECTRUM ANALYZER -->
  <div class="spectrum-section">
    <div class="section-label">SPECTRUM ANALYZER</div>
    <div class="peak-hold" id="peakDisplay" style="color:var(--dim);">PEAK — dB</div>
    <canvas id="spectrumCanvas"></canvas>
  </div>

  <!-- FREQ LABELS -->
  <div class="freq-labels">
    <span>20</span><span>50</span><span>100</span><span>200</span>
    <span>500</span><span>1K</span><span>2K</span><span>5K</span>
    <span>10K</span><span>20K</span>
  </div>

  <!-- WAVEFORM -->
  <div class="waveform-section">
    <div class="section-label">WAVEFORM</div>
    <canvas id="waveformCanvas"></canvas>
  </div>

  <!-- VU METERS -->
  <div class="vu-section">
    <div class="vu-row">
      <div class="vu-ch">L</div>
      <div class="vu-track">
        <div class="vu-fill" id="vuL"></div>
        <div class="vu-peak" id="vuPeakL" style="left:0%"></div>
      </div>
      <div class="vu-db" id="vuDbL">—</div>
    </div>
    <div class="vu-row">
      <div class="vu-ch">R</div>
      <div class="vu-track">
        <div class="vu-fill" id="vuR"></div>
        <div class="vu-peak" id="vuPeakR" style="left:0%"></div>
      </div>
      <div class="vu-db" id="vuDbR">—</div>
    </div>
  </div>

  <!-- METERS STRIP -->
  <div class="meters-strip">
    <div class="meter-cell">
      <div class="meter-label">RMS</div>
      <div class="meter-value" id="mRms">—</div>
      <div class="meter-unit">dB</div>
    </div>
    <div class="meter-cell">
      <div class="meter-label">PEAK</div>
      <div class="meter-value" id="mPeak">—</div>
      <div class="meter-unit">dB</div>
    </div>
    <div class="meter-cell">
      <div class="meter-label">FREQ</div>
      <div class="meter-value green" id="mFreq">—</div>
      <div class="meter-unit">Hz</div>
    </div>
    <div class="meter-cell">
      <div class="meter-label">SIZE</div>
      <div class="meter-value" id="mSize">0.0</div>
      <div class="meter-unit">MB</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls-section">
    <div class="timer-display" id="timerDisplay">00:00.00</div>

    <div class="btn-row">
      <button class="btn btn-record" id="btnRecord" onclick="toggleRecord()">⏺ RECORD</button>
      <button class="btn btn-stop" id="btnStop" onclick="stopRecording()" disabled>⏹ STOP</button>
    </div>

    <div class="settings-row">
      <div class="setting-block">
        <label>Sample Rate</label>
        <select id="sampleRate">
          <option value="44100">44.1 kHz</option>
          <option value="48000" selected>48 kHz</option>
          <option value="96000">96 kHz</option>
          <option value="192000">192 kHz</option>
        </select>
      </div>
      <div class="setting-block">
        <label>Channels</label>
        <select id="channels">
          <option value="1">Mono</option>
          <option value="2" selected>Stereo</option>
        </select>
      </div>
      <div class="setting-block">
        <label>FFT Size</label>
        <select id="fftSize" onchange="updateFFT()">
          <option value="1024">1024</option>
          <option value="2048" selected>2048</option>
          <option value="4096">4096</option>
          <option value="8192">8192</option>
        </select>
      </div>
      <div class="setting-block">
        <label>View Mode</label>
        <select id="viewMode">
          <option value="bars">Bars</option>
          <option value="lines">Line</option>
          <option value="filled">Filled</option>
        </select>
      </div>
    </div>
  </div>

  <!-- RECORDINGS -->
  <div class="recordings-section">
    <div class="recordings-header">RECORDINGS</div>
    <div id="recordingsList"><div class="no-recs">NO RECORDINGS YET</div></div>
  </div>

</main>

<script>
// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let audioCtx = null;
let analyser = null;
let source = null;
let mediaRecorder = null;
let stream = null;
let chunks = [];
let isRecording = false;
let timerInterval = null;
let startTime = 0;
let totalBytes = 0;
let recordings = [];
let recCount = 0;

// Peak holds
let peakL = 0, peakR = 0;
let peakLTimer = 0, peakRTimer = 0;
let globalPeak = -Infinity;

// Animation
let animId = null;

// Canvas setup
const specCanvas = document.getElementById('spectrumCanvas');
const wvCanvas = document.getElementById('waveformCanvas');
const sCtx = specCanvas.getContext('2d');
const wCtx = wvCanvas.getContext('2d');

function resizeCanvases() {
  specCanvas.width = specCanvas.offsetWidth * devicePixelRatio;
  specCanvas.height = specCanvas.offsetHeight * devicePixelRatio;
  wvCanvas.width = wvCanvas.offsetWidth * devicePixelRatio;
  wvCanvas.height = wvCanvas.offsetHeight * devicePixelRatio;
}
resizeCanvases();
window.addEventListener('resize', resizeCanvases);

// ─────────────────────────────────────────
// AUDIO INIT
// ─────────────────────────────────────────
async function initAudio() {
  const sampleRate = parseInt(document.getElementById('sampleRate').value);
  const channelCount = parseInt(document.getElementById('channels').value);

  stream = await navigator.mediaDevices.getUserMedia({
    audio: {
      sampleRate,
      channelCount,
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false,
      latency: 0,
      sampleSize: 24
    }
  });

  audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate });
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = parseInt(document.getElementById('fftSize').value);
  analyser.smoothingTimeConstant = 0.8;

  source = audioCtx.createMediaStreamSource(stream);
  source.connect(analyser);

  setStatus('READY', 'ready');
  startViz();
}

function updateFFT() {
  if (analyser) {
    analyser.fftSize = parseInt(document.getElementById('fftSize').value);
  }
}

// ─────────────────────────────────────────
// RECORDING
// ─────────────────────────────────────────
async function toggleRecord() {
  if (!stream) {
    try { await initAudio(); } catch(e) {
      alert('Microphone access denied. Please allow mic access and try again.');
      return;
    }
  }
  if (isRecording) return;
  startRecording();
}

function startRecording() {
  chunks = [];
  totalBytes = 0;
  globalPeak = -Infinity;

  const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/ogg'].find(
    t => MediaRecorder.isTypeSupported(t)
  ) || '';

  mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) { chunks.push(e.data); totalBytes += e.data.size; }
    document.getElementById('mSize').textContent = (totalBytes/1048576).toFixed(2);
  };
  mediaRecorder.start(100);
  isRecording = true;

  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 30);

  document.getElementById('btnRecord').classList.add('active-btn');
  document.getElementById('btnStop').disabled = false;
  document.getElementById('btnStop').classList.add('active-btn');
  document.getElementById('recLed').className = 'led active';
  document.getElementById('timerDisplay').classList.add('recording');
  setStatus('REC', 'active');
}

function stopRecording() {
  if (!mediaRecorder) return;
  mediaRecorder.stop();
  isRecording = false;
  clearInterval(timerInterval);

  mediaRecorder.onstop = () => {
    const blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' });
    saveRecording(blob);
  };

  document.getElementById('btnRecord').classList.remove('active-btn');
  document.getElementById('btnStop').disabled = true;
  document.getElementById('btnStop').classList.remove('active-btn');
  document.getElementById('recLed').className = 'led ready';
  document.getElementById('timerDisplay').classList.remove('recording');
  setStatus('READY', 'ready');
}

function saveRecording(blob) {
  recCount++;
  const url = URL.createObjectURL(blob);
  const duration = document.getElementById('timerDisplay').textContent;
  const sr = document.getElementById('sampleRate').value;
  const ch = parseInt(document.getElementById('channels').value) === 2 ? 'Stereo' : 'Mono';
  const ts = new Date().toLocaleTimeString();
  const name = `REC_${String(recCount).padStart(3,'0')}`;

  recordings.unshift({ name, url, duration, sr, ch, ts, blob, size: blob.size });
  renderRecordings();
}

function renderRecordings() {
  const list = document.getElementById('recordingsList');
  if (!recordings.length) { list.innerHTML = '<div class="no-recs">NO RECORDINGS YET</div>'; return; }

  list.innerHTML = recordings.map((r,i) => `
    <div class="recording-item">
      <div class="rec-icon"></div>
      <div class="rec-info">
        <div class="rec-name">${r.name}</div>
        <div class="rec-meta">${r.ts} · ${r.duration} · ${(r.sr/1000).toFixed(1)}kHz · ${r.ch} · ${(r.size/1048576).toFixed(2)}MB</div>
      </div>
      <div class="rec-actions">
        <button class="rec-btn" onclick="playRec(${i})">▶</button>
        <button class="rec-btn dl" onclick="downloadRec(${i})">↓</button>
      </div>
    </div>
  `).join('');
}

function playRec(i) {
  const a = new Audio(recordings[i].url);
  a.play();
}

function downloadRec(i) {
  const r = recordings[i];
  const ext = r.blob.type.includes('ogg') ? 'ogg' : 'webm';
  const a = document.createElement('a');
  a.href = r.url;
  a.download = `${r.name}.${ext}`;
  a.click();
}

// ─────────────────────────────────────────
// TIMER
// ─────────────────────────────────────────
function updateTimer() {
  const ms = Date.now() - startTime;
  const mins = Math.floor(ms/60000);
  const secs = Math.floor((ms%60000)/1000);
  const cs = Math.floor((ms%1000)/10);
  document.getElementById('timerDisplay').textContent =
    `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

// ─────────────────────────────────────────
// VISUALIZATION
// ─────────────────────────────────────────
function startViz() {
  if (animId) cancelAnimationFrame(animId);
  drawFrame();
}

function drawFrame() {
  animId = requestAnimationFrame(drawFrame);
  if (!analyser) return;

  const bufLen = analyser.frequencyBinCount;
  const freqData = new Uint8Array(bufLen);
  const timeData = new Float32Array(analyser.fftSize);

  analyser.getByteFrequencyData(freqData);
  analyser.getFloatTimeDomainData(timeData);

  drawSpectrum(freqData, bufLen);
  drawWaveform(timeData);
  updateMeters(freqData, timeData, bufLen);
}

// ── Spectrum
function drawSpectrum(data, bufLen) {
  const W = specCanvas.width, H = specCanvas.height;
  sCtx.clearRect(0,0,W,H);

  // Background gradient
  const bg = sCtx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#060d14'); bg.addColorStop(1,'#080c10');
  sCtx.fillStyle = bg; sCtx.fillRect(0,0,W,H);

  // Grid lines
  sCtx.strokeStyle = 'rgba(0,229,255,0.05)';
  sCtx.lineWidth = 1;
  for (let i=0;i<6;i++) {
    const y = (H/5)*i;
    sCtx.beginPath(); sCtx.moveTo(0,y); sCtx.lineTo(W,y); sCtx.stroke();
  }

  const mode = document.getElementById('viewMode').value;
  const barW = W / bufLen * 2.5;
  const step = Math.ceil(bufLen / (W / Math.max(barW,1)));

  if (mode === 'bars') {
    for (let i=0; i<bufLen; i+=step) {
      const v = data[i]/255;
      const bH = v * H;
      const x = (i/bufLen) * W;
      const bw = Math.max((W/bufLen)*step*0.8, 1);

      // Color by frequency band
      let color;
      const pct = i/bufLen;
      if (pct < 0.1) color = `rgba(255,61,113,${0.7+v*0.3})`;
      else if (pct < 0.3) color = `rgba(255,170,0,${0.7+v*0.3})`;
      else if (pct < 0.6) color = `rgba(0,229,255,${0.7+v*0.3})`;
      else color = `rgba(0,255,157,${0.6+v*0.4})`;

      // Glow
      sCtx.shadowBlur = 8 * v;
      sCtx.shadowColor = color;
      sCtx.fillStyle = color;
      sCtx.fillRect(x, H-bH, bw, bH);

      // Reflection
      sCtx.shadowBlur = 0;
      const ref = sCtx.createLinearGradient(0, H, 0, H+bH*0.3);
      ref.addColorStop(0, color.replace(/[\d.]+\)$/, '0.15)'));
      ref.addColorStop(1, 'transparent');
      sCtx.fillStyle = ref;
      sCtx.fillRect(x, H, bw, bH*0.3);
    }
  } else {
    // Line / filled
    sCtx.beginPath();
    let first = true;
    for (let i=0; i<bufLen; i+=2) {
      const x = (i/bufLen)*W;
      const y = H - (data[i]/255)*H;
      if (first) { sCtx.moveTo(x,y); first=false; }
      else sCtx.lineTo(x,y);
    }

    if (mode === 'filled') {
      sCtx.lineTo(W,H); sCtx.lineTo(0,H); sCtx.closePath();
      const grad = sCtx.createLinearGradient(0,0,0,H);
      grad.addColorStop(0,'rgba(0,229,255,0.6)');
      grad.addColorStop(0.5,'rgba(0,255,157,0.3)');
      grad.addColorStop(1,'rgba(0,229,255,0.02)');
      sCtx.fillStyle = grad;
      sCtx.fill();
    }

    sCtx.shadowBlur = 10; sCtx.shadowColor = '#00e5ff';
    sCtx.strokeStyle = '#00e5ff'; sCtx.lineWidth = 1.5 * devicePixelRatio;
    sCtx.stroke(); sCtx.shadowBlur = 0;
  }

  // dB scale on right
  sCtx.fillStyle = 'rgba(74,96,112,0.7)';
  sCtx.font = `${8*devicePixelRatio}px "Share Tech Mono"`;
  const dbs = ['0','−20','−40','−60','−80'];
  dbs.forEach((d,i) => {
    sCtx.fillText(d, W-28*devicePixelRatio, (H/4)*i + 10*devicePixelRatio);
  });
}

// ── Waveform
function drawWaveform(data) {
  const W = wvCanvas.width, H = wvCanvas.height;
  wCtx.clearRect(0,0,W,H);
  wCtx.fillStyle = '#07101a'; wCtx.fillRect(0,0,W,H);

  // Center line
  wCtx.strokeStyle = 'rgba(0,229,255,0.08)';
  wCtx.lineWidth = 1;
  wCtx.beginPath(); wCtx.moveTo(0,H/2); wCtx.lineTo(W,H/2); wCtx.stroke();

  // Waveform
  wCtx.beginPath();
  const step = Math.ceil(data.length/W);
  for (let i=0;i<W;i++) {
    const idx = Math.floor(i*data.length/W);
    const v = data[idx];
    const y = (0.5 + v*0.5) * H;
    i===0 ? wCtx.moveTo(i,y) : wCtx.lineTo(i,y);
  }
  wCtx.shadowBlur = 6; wCtx.shadowColor = '#00ff9d';
  wCtx.strokeStyle = isRecording ? '#00ff9d' : '#00e5ff';
  wCtx.lineWidth = 1.5 * devicePixelRatio;
  wCtx.stroke(); wCtx.shadowBlur = 0;
}

// ── Meters update
let peakDecay = 0, rmsAcc = 0, rmsCount = 0;
let domFreq = 0;

function updateMeters(freqData, timeData, bufLen) {
  // RMS
  let sumSq = 0;
  for (let i=0;i<timeData.length;i++) sumSq += timeData[i]*timeData[i];
  const rms = Math.sqrt(sumSq/timeData.length);
  const rmsDb = rms > 0 ? 20*Math.log10(rms) : -Infinity;

  // Peak
  let pk = 0;
  for (let i=0;i<timeData.length;i++) pk = Math.max(pk, Math.abs(timeData[i]));
  const pkDb = pk > 0 ? 20*Math.log10(pk) : -Infinity;

  if (pkDb > globalPeak) globalPeak = pkDb;

  // Dominant freq
  let maxBin=0, maxVal=0;
  for (let i=1;i<bufLen;i++) { if(freqData[i]>maxVal){maxVal=freqData[i];maxBin=i;} }
  if (audioCtx) {
    domFreq = maxBin * audioCtx.sampleRate / (analyser.fftSize);
  }

  // VU bars
  const vuPct = Math.min(pk, 1) * 100;
  document.getElementById('vuL').style.width = vuPct+'%';
  document.getElementById('vuR').style.width = Math.max(0, vuPct - Math.random()*3)+'%';

  // Peak hold
  if (vuPct > peakL) { peakL=vuPct; peakLTimer=60; }
  else if (peakLTimer-- <= 0) peakL = Math.max(0, peakL-0.5);
  document.getElementById('vuPeakL').style.left = peakL+'%';

  if (vuPct > peakR) { peakR=vuPct; peakRTimer=60; }
  else if (peakRTimer-- <= 0) peakR = Math.max(0, peakR-0.5);
  document.getElementById('vuPeakR').style.left = peakR+'%';

  const fmt = v => isFinite(v) ? v.toFixed(1) : '—';
  document.getElementById('vuDbL').textContent = fmt(pkDb);
  document.getElementById('vuDbR').textContent = fmt(pkDb-0.3);

  // Meter cells
  const rmsEl = document.getElementById('mRms');
  rmsEl.textContent = fmt(rmsDb);
  rmsEl.className = 'meter-value' + (rmsDb > -6 ? (rmsDb > -3 ? ' clip' : ' warn') : '');

  const pkEl = document.getElementById('mPeak');
  pkEl.textContent = fmt(pkDb);
  pkEl.className = 'meter-value' + (pkDb > -6 ? (pkDb > -3 ? ' clip' : ' warn') : '');

  document.getElementById('mFreq').textContent = domFreq > 0 ? Math.round(domFreq) : '—';

  // Peak display
  if (isFinite(globalPeak)) {
    const pd = document.getElementById('peakDisplay');
    pd.textContent = `PEAK ${globalPeak.toFixed(1)} dB`;
    pd.style.color = globalPeak > -6 ? 'var(--accent3)' : 'var(--accent2)';
  }
}

// ─────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────
function setStatus(text, type) {
  document.getElementById('statusText').textContent = text;
  const led = document.getElementById('recLed');
  led.className = 'led' + (type ? ' '+type : '');
}

// Draw idle state
(function drawIdle() {
  const W = specCanvas.offsetWidth * devicePixelRatio || 400;
  const H = 200 * devicePixelRatio;
  specCanvas.width = W; specCanvas.height = H;
  sCtx.fillStyle = '#060d14'; sCtx.fillRect(0,0,W,H);

  sCtx.fillStyle = 'rgba(0,229,255,0.08)';
  sCtx.font = `${11*devicePixelRatio}px "Share Tech Mono"`;
  sCtx.textAlign = 'center';
  sCtx.fillText('TAP RECORD TO BEGIN', W/2, H/2);
  sCtx.textAlign = 'left';

  const wW = wvCanvas.offsetWidth * devicePixelRatio || 400;
  const wH = 90 * devicePixelRatio;
  wvCanvas.width = wW; wvCanvas.height = wH;
  wCtx.fillStyle = '#07101a'; wCtx.fillRect(0,0,wW,wH);
  wCtx.strokeStyle = 'rgba(0,229,255,0.08)'; wCtx.lineWidth=1;
  wCtx.beginPath(); wCtx.moveTo(0,wH/2); wCtx.lineTo(wW,wH/2); wCtx.stroke();
})();
</script>
